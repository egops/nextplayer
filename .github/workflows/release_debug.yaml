# Builds debug + release APKs and publishes a GitHub pre-release for filmstrip-seekbar-pr.
# Triggered only by the filmstrip / thumbnail preview feature branch.
# Release APKs use the release-with-debug-signing variant (minified, debug-signed, installable on device).
# Production signing: push branch release/v*.*.* (see publish.yaml).
# Reads versionName/versionCode from app/build.gradle.kts for release assets and update metadata.
name: Filmstrip Build & Release

on:
  push:
    branches:
      - filmstrip-seekbar-pr
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to filmstrip-seekbar-pr.'
        required: false
        type: string
        default: filmstrip-seekbar-pr

concurrency:
  group: filmstrip-build-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Build debug & release APKs and publish pre-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Build debug and release APKs
        run: |
          ./gradlew assembleDebug assembleRelease-with-debug-signing --no-daemon

      - name: Read app version
        id: app_version
        run: |
          version_name=$(grep 'versionName =' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          version_code=$(grep 'versionCode =' app/build.gradle.kts | head -1 | awk '{print $3}')
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"

      - name: Record build commit
        id: build_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        id: release_meta
        run: |
          ref_name="${{ github.event.inputs.ref || github.ref_name }}"
          ref_name="${ref_name#refs/heads/}"
          safe_ref_name="${ref_name//\//-}"
          release_tag="build-${safe_ref_name}"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "safe_ref_name=${safe_ref_name}" >> "$GITHUB_OUTPUT"

          version_name="${{ steps.app_version.outputs.version_name }}"
          commit_sha="${{ steps.build_commit.outputs.sha }}"
          mkdir -p release-assets

          # Debug (debuggable, package: dev.anilbeesetti.nextplayer.fork.debug)
          cp app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
            "release-assets/nextplayer-v${version_name}-${commit_sha}-debug-${safe_ref_name}-arm64-v8a.apk"
          cp app/build/outputs/apk/debug/app-universal-debug.apk \
            "release-assets/nextplayer-v${version_name}-${commit_sha}-debug-${safe_ref_name}-universal.apk"

          # Release (minified, debug-signed, package: dev.anilbeesetti.nextplayer.fork.release)
          cp app/build/outputs/apk/release-with-debug-signing/app-arm64-v8a-release-with-debug-signing.apk \
            "release-assets/nextplayer-v${version_name}-${commit_sha}-release-${safe_ref_name}-arm64-v8a.apk"
          cp app/build/outputs/apk/release-with-debug-signing/app-universal-release-with-debug-signing.apk \
            "release-assets/nextplayer-v${version_name}-${commit_sha}-release-${safe_ref_name}-universal.apk"

          ls -lh release-assets/

      - name: Remove stale APK assets from existing pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release_meta.outputs.release_tag }}"
          release_id=$(gh release view "$tag" --repo "${{ github.repository }}" --json id -q .id 2>/dev/null || true)
          if [ -n "$release_id" ]; then
            gh api "/repos/${{ github.repository }}/releases/${release_id}/assets" \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r asset_id; do
                  echo "Deleting stale asset id=${asset_id}"
                  gh api -X DELETE "/repos/${{ github.repository }}/releases/assets/${asset_id}"
                done
          fi

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: Build ${{ steps.app_version.outputs.version_name }} — debug + release (filmstrip)
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Automated **debug** and **release** APKs for the filmstrip / thumbnail preview branch.

            | Field | Value |
            | --- | --- |
            | Version | `${{ steps.app_version.outputs.version_name }}` (${{ steps.app_version.outputs.version_code }}) |
            | Branch | `filmstrip-seekbar-pr` |
            | Commit | [`${{ steps.build_commit.outputs.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.build_commit.outputs.sha }}) |
            | Workflow | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## APK types

            | Type | Filename contains | Package id | Notes |
            | --- | --- | --- | --- |
            | **Debug** | `-debug-` | `dev.anilbeesetti.nextplayer.fork.debug` | Debuggable, faster iteration |
            | **Release** | `-release-` | `dev.anilbeesetti.nextplayer.fork.release` | Minified/shrunk, signed with debug keystore (installable) |

            ## Install

            - Most phones: `*-arm64-v8a.apk`
            - Universal: larger, all ABIs

            Pick **debug** or **release** per filename; they can be installed side by side (different package ids).

            Store-signed production builds: push `release/v<version>` (see `publish.yaml`, requires signing secrets).
          files: |
            release-assets/*.apk
